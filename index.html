<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经久不息欢迎您的加入！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 12px;
        }
        .page { width: 100%; max-width: 420px; }
        .header { text-align: center; padding: 32px 20px 20px; color: #fff; }
        .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header .subtitle { font-size: 14px; opacity: 0.85; margin-top: 8px; }

        /* 顶部文字区 */
        .top-text-card {
            background: #fff; border-radius: 16px; padding: 20px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); margin-bottom: 16px;
            font-size: 15px; color: #333; line-height: 1.8; text-align: center;
        }

        /* 二维码卡 */
        .qr-card {
            background: #fff; border-radius: 16px; padding: 16px;
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); margin-bottom: 16px;
        }
        .qr-card .qr-label { font-size: 15px; color: #666; margin-bottom: 10px; font-weight: 500; }
        .qr-card .qr-img {
            width: 100%; max-width: 340px; height: auto; aspect-ratio: 1;
            object-fit: cover; border-radius: 12px;
            margin: 0 auto;
        }
        .qr-card .qr-tip { font-size: 12px; color: #aaa; margin-top: 10px; }
        .qq-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #12B7F5 0%, #0D93E0 100%);
            color: #fff;
            padding: 14px 36px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(18, 183, 245, 0.45);
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 12px 0;
        }
        .qq-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(18, 183, 245, 0.4);
        }
        .qq-icon {
            width: 24px; height: 24px;
            fill: #fff;
        }

        /* 图片展示 - 横向排列 */
        .banner-card {
            background: rgba(255,255,255,0.2);
            border-radius: 16px; padding: 16px;
            text-align: center; margin-bottom: 16px;
        }
        .banner-card .banner-label { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 10px; font-weight: 500; }
        .banner-grid {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .banner-grid .img-wrap {
            flex: 1;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: zoom-in;
            aspect-ratio: 1;
        }
        .banner-grid .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 
                inset 0 0 30px rgba(102, 126, 234, 0.8),
                inset 0 0 60px rgba(102, 126, 234, 0.4),
                inset 0 0 90px rgba(102, 126, 234, 0.2),
                0 4px 16px rgba(0,0,0,0.1);
            display: block;
        }
        .banner-grid .img-wrap .zoom-hint {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 12px;
            padding: 6px 0;
            text-align: center;
            border-radius: 0 0 12px 12px;
        }
        .banner-grid .full-width {
            /* kept for compatibility */
        }

        .footer { text-align: center; padding: 24px 0 8px; font-size: 12px; color: rgba(255,255,255,0.6); }
        .placeholder {
            background: rgba(255,255,255,0.15); border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 12px; padding: 40px 20px; text-align: center;
            color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 16px;
        }
        .placeholder.narrow { padding: 24px 16px; }

        /* 图片放大弹窗 */
        .img-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .img-modal.active { display: flex; }
        .img-modal img {
            max-width: 95%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }
        .img-modal .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%;
            color: #fff; font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeInUp 0.5s ease-out both; }
        .fade-in-d1 { animation-delay: 0.1s; }
        .fade-in-d2 { animation-delay: 0.2s; }
        .fade-in-d3 { animation-delay: 0.3s; }
        .fade-in-d4 { animation-delay: 0.4s; }
        .fade-in-d5 { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="page">
        <div class="header fade-in">
            <h1>加入我们</h1>
            <p class="subtitle">每日活动，实时分享</p>
        </div>

        <!-- 顶部文字编辑区 -->
        <div class="top-text-card fade-in fade-in-d1">
            <p>欢迎加入经久不息，一起学习进步！</p>
        </div>

        <!-- 二维码 -->
        <div class="qr-card fade-in fade-in-d2">
            <p class="qr-label">加下面微信拉你进群</p>
            <img class="qr-img" src="images/qrcode.jpg" alt="社群二维码" onerror="this.style.display='none';this.parentNode.innerHTML+='<p style=\x27color:#aaa;font-size:14px;\x27>二维码待上传</p>'">
            <p class="qr-tip">长按或扫描二维码</p>
        </div>

        <!-- QQ群 -->
        <div class="qr-card fade-in fade-in-d2">
            <p class="qr-label">加入QQ群交流</p>
            <a href="https://qm.qq.com/q/mQXrM94qXu" target="_blank" class="qq-btn">
                <svg class="qq-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3v1c0 1.66-1.34 3-3 3s-3-1.34-3-3V8c0-1.66 1.34-3 3-3zm-5 9.5c0-.83.67-1.5 1.5-1.5h7c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-7c-.83 0-1.5-.67-1.5-1.5zM8 18c0-2.21 1.79-4 4-4s4 1.79 4 4H8z" fill="#fff"/></svg>
                点击加入QQ群
            </a>
            <p class="qr-tip">点击按钮直接跳转</p>
        </div>

        <!-- 图片展示 -->
        <div class="banner-card fade-in fade-in-d3">
            <p class="banner-label">群友反馈展示</p>
            <div class="banner-grid">
                <div class="img-wrap"><img src="images/banner1.jpg" alt="展示图片1"><span class="zoom-hint">🔍 点击放大</span></div>
                <div class="img-wrap"><img src="images/banner2.jpg" alt="展示图片2"><span class="zoom-hint">🔍 点击放大</span></div>
                <div class="img-wrap"><img src="images/banner3.jpg" alt="展示图片3"><span class="zoom-hint">🔍 点击放大</span></div>
            </div>
        </div>

        <div class="footer">经久不息欢迎您！</div>
    </div>

    <!-- 图片放大弹窗 -->
    <div class="img-modal" id="imgModal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <img id="modalImg" src="" alt="放大图片">
    </div>

    <script>
        document.querySelectorAll('img').forEach(img => {
            img.style.cursor = 'zoom-in';
            img.addEventListener('click', function() {
                document.getElementById('modalImg').src = this.src;
                document.getElementById('imgModal').classList.add('active');
            });
        });
        document.getElementById('imgModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        function closeModal() {
            document.getElementById('imgModal').classList.remove('active');
        }
    </script>
</body>
</html>
